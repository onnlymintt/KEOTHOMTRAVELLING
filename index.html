<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kèo Thơm - Dự án Thực hành Kinh doanh</title>
    <style>
        :root {
            --keothom-blue: #2980b9;
            --keothom-accent: #2ecc71;
            --purple-xinh-to: #9b59b6;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Giao diện App Giả */
        #fake-app-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f7f6; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .app-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px;
        }

        .logo-circle {
            width: 80px; height: 80px; background: var(--keothom-blue);
            border-radius: 20px; margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 2rem;
        }

        .btn-interact {
            background: var(--keothom-accent); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 20px;
        }

        .btn-interact:hover { transform: scale(1.05); background: #27ae60; }

        /* Scene chúc mừng sinh nhật (Ẩn bên dưới) */
        #real-surprise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }

        .balcony-rail {
            width: 100%; height: 140px; background: #222; border-top: 5px solid #444;
            display: flex; justify-content: center; position: relative; z-index: 10;
        }

        .characters { display: flex; gap: 80px; margin-bottom: -15px; z-index: 5; }
        .char-img { height: 250px; filter: contrast(1.1) drop-shadow(0 0 20px rgba(0,0,0,0.4)); }

        .wishes {
            position: absolute; top: 15%; width: 90%; display: flex;
            justify-content: space-between; color: white;
        }

        .wish-text {
            width: 35%; font-size: 1.4rem; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); line-height: 1.5;
            opacity: 0; transform: translateY(20px); transition: 2s 1s forwards;
        }

        /* Khi mở app */
        .opened { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="LINK_NHAC_CUA_BAN" loop></audio>

    <div id="fake-app-overlay">
        <div class="app-card">
            <div class="logo-circle">KT</div>
            <h2 style="color: var(--keothom-blue);">Kèo Thơm v2.0</h2>
            <p style="color: #666;">Môn: Thực hành dự án kinh doanh</p>
            <p style="font-size: 0.9rem; color: #888;">Vui lòng tương tác để xuất file số liệu khảo sát người dùng du lịch 2026.</p>
            <button class="btn-interact" onclick="revealSurprise()">TRUY XUẤT SỐ LIỆU</button>
        </div>
    </div>

    <div id="real-surprise">
        <div class="wishes">
            <div class="wish-text" id="wish1" style="color: var(--purple-xinh-to);">
                Mừng Tí Đô thêm tuổi mới! <br> Chúc cậu luôn rạng rỡ như ánh hoàng hôn này.
            </div>
            <div class="wish-text" id="wish2" style="text-align: right;">
                D.O. bảo là: <br> "Hãy luôn hạnh phúc nhé Tí Đô ơi!" <br> 💜 Happy Birthday!
            </div>
        </div>

        <div class="characters">
            <img src="LINK_ANH_TI_DO" class="char-img" alt="Tí Đô">
            <img src="LINK_ANH_DO_EXO" class="char-img" alt="D.O.">
        </div>
        <div class="balcony-rail"></div>
    </div>

    <script>
        function revealSurprise() {
            // Hiệu ứng mở app
            document.getElementById('fake-app-overlay').classList.add('opened');
            
            // Hiện lời chúc
            document.getElementById('wish1').style.opacity = '1';
            document.getElementById('wish1').style.transform = 'translateY(0)';
            document.getElementById('wish2').style.opacity = '1';
            document.getElementById('wish2').style.transform = 'translateY(0)';

            // Chạy nhạc
            const music = document.getElementById('bgMusic');
            music.play();
        }
    </script>
</body>
</html>
