<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kèo Thơm - Aesthetics Core Data</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --text: #fff;
            --purple-xt: #a29bfe;
            --sunset-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; background: #000; color: var(--text); }

        /* LAYER 1: APP KÈO THƠM (TRAP) */
        #fake-app {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: transform 1s cubic-bezier(1, 0, 0, 1), opacity 0.8s;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 60px; border-radius: 40px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .app-logo { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, #ffeaa7, #fab1a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-interact {
            background: white; color: #667eea; border: none;
            padding: 18px 50px; border-radius: 50px; font-size: 1.2rem; font-weight: 700;
            cursor: pointer; transition: 0.4s; margin-top: 40px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* LAYER 2: CORE TEAM */
        #core-team-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 90;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: 0.8s;
        }

        .polaroid {
            background: white; padding: 15px 15px 50px 15px;
            border-radius: 5px; box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            transform: rotate(-3deg);
        }

        .team-photo { width: 320px; height: 320px; object-fit: cover; }

        /* LAYER 3: FINAL SCENE */
        #final-scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sunset-gradient);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            z-index: 10; opacity: 0; transition: opacity 1s;
        }

        .polaroid-group {
            display: flex; gap: 60px; margin-bottom: 30px; z-index: 15;
            transform: scale(0); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pol-final {
            background: white; padding: 12px 12px 45px 12px;
            border-radius: 3px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .pol-final img { width: 250px; height: 250px; object-fit: cover; }

        .wishes {
            position: absolute; top: 12%; width: 90%; display: flex;
            justify-content: space-between; z-index: 20; color: #2d3436;
        }

        .wish-box { width: 40%; font-size: 1.7rem; font-weight: 300; opacity: 0; transform: translateY(20px); transition: 2s; }

        #explosion-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 95; opacity: 0; pointer-events: none; }

        /* Utils */
        .hide-app { transform: scale(1.2) !important; opacity: 0; pointer-events: none; }
        .show { opacity: 1 !important; }
        .exploded { transform: scale(1) !important; }
        .flash { animation: flash-anim 0.5s; }
        @keyframes flash-anim { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" src="ordinarydays.mp3" loop></audio>

    <div id="explosion-flash"></div>

    <div id="fake-app">
        <div class="glass-card">
            <div class="app-logo">Kèo Thơm</div>
            <p>Dự án Kinh doanh - Travel Analytics</p>
            <button class="btn-interact" onclick="startReveal()">Xác thực Core Data</button>
        </div>
    </div>

    <div id="core-team-layer">
        <div class="polaroid">
            <img src="core1.jpg" class="team-photo" alt="Core Team">
        </div>
        <p style="margin-top:20px; letter-spacing:3px;">CONNECTING TO DATABASE...</p>
    </div>

    <div id="final-scene">
        <div class="wishes">
            <div class="wish-box" id="wish1">Gửi <strong>Tí Đô</strong>,<br>Chúc tuổi mới rực rỡ và ngọt ngào như ánh hoàng hôn này.</div>
            <div class="wish-box" id="wish2" style="text-align: right;">D.O. và Hoàng chúc cậu<br>mãi hạnh phúc và <strong>aesthetics</strong> nhé! 💜</div>
        </div>

        <div class="polaroid-group" id="pol-group">
            <div class="pol-final" style="transform: rotate(-4deg);">
                <img src="tino.jpg" alt="Tí Đô">
            </div>
            <div class="pol-final" style="transform: rotate(4deg);">
                <img src="do.jpg" alt="D.O.">
            </div>
        </div>
        <div style="width:100%; height:120px; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); z-index:20;"></div>
    </div>

    <script>
        function startReveal() {
            const music = document.getElementById('bgMusic');
            music.play().catch(() => console.log("Music play blocked"));

            document.getElementById('fake-app').classList.add('hide-app');

            setTimeout(() => {
                document.getElementById('core-team-layer').classList.add('show');
            }, 600);

            setTimeout(() => {
                document.getElementById('explosion-flash').classList.add('flash');
                document.getElementById('core-team-layer').classList.remove('show');
                document.getElementById('final-scene').classList.add('show');

                setTimeout(() => {
                    document.getElementById('pol-group').classList.add('exploded');
                    setTimeout(() => {
                        document.getElementById('wish1').style.opacity = "1";
                        document.getElementById('wish1').style.transform = "translateY(0)";
                        document.getElementById('wish2').style.opacity = "1";
                        document.getElementById('wish2').style.transform = "translateY(0)";
                    }, 800);
                }, 100);
            }, 4500);
        }
    </script>
</body>
</html>
